name: Budget Planner CI

on:
  push:
    branches: [main, develop]
    paths:
      - "budget-planner/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "budget-planner/**"

defaults:
  run:
    working-directory: budget-planner/backend

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Verify Alembic migration applies
        env:
          BP_DATABASE_URL: sqlite:///./ci.db
        run: alembic upgrade head

      - name: Run tests (pytest, TDD)
        run: pytest -q

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: budget-planner/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: budget-planner/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (vitest)
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t budget-planner-backend .
