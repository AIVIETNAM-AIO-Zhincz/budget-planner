# Agent OS Standards Index

root:
  coding-style:
    description: Python style, formatting (black/ruff), type hints, docstrings, YAGNI
  naming:
    description: Naming conventions for code, files, and database tables/columns

api:
  fastapi:
    description: FastAPI router/schema conventions, RBAC enforcement, space isolation, audit log

database:
  migrations:
    description: Alembic migration workflow, one revision per schema change, autogenerate and review

testing:
  tdd:
    description: Test-Driven Development with pytest, edge cases, permission and AI fallback tests
