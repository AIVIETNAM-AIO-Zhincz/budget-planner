line-length = 100
target-version = "py310"

[lint]
select = ["E", "F", "I", "B", "UP"]
# B008: Depends(...) trong default tham số là idiom chuẩn của FastAPI.
ignore = ["B008"]

[lint.per-file-ignores]
# conftest cần set env trước khi import app → cho phép import sau code.
"tests/conftest.py" = ["E402"]
